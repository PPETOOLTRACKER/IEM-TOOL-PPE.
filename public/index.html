<<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tool, PPE & Calibration Date Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f0ede8; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f0ede8; }
    ::-webkit-scrollbar-thumb { background: #c8c5be; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const XLSX_LIB = window.XLSX;

// ─── API helpers ──────────────────────────────────────────────────────────────
const API = async (path, method='GET', body) => {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
};

// ─── Constants ────────────────────────────────────────────────────────────────
const ALL_TABS   = ["Dashboard","Tools","Check Out","Past Due","PPE & Meters","People","QR Scanner","Management","SOP"];
const STAFF_TABS = ["Dashboard","Tools","Check Out","Past Due","PPE & Meters","People","QR Scanner","SOP"];
const DEFAULT_CATEGORIES = ["Power Tools","Hand Tools","Measuring","Safety","Lifting","Other"];
const MAINTAIN_STATUSES  = ["Good","Needs Service","Out of Service","Lost"];
const PPE_TYPES = ["Hard Hat","Safety Glasses","Hi-Vis Vest","Gloves","Steel-Toe Boots","Ear Protection","Face Shield","Respirator","Fall Harness","Other"];
const PPE_MONTHS   = 5.5;
const CAL_WARN_DAYS = 30;

// ─── Helpers ──────────────────────────────────────────────────────────────────
const getHoursOut  = (iso) => iso ? (Date.now()-new Date(iso).getTime())/3600000 : 0;
const getDaysUntil = (iso) => iso ? (new Date(iso).getTime()-Date.now())/86400000 : null;
const getDaysSince = (iso) => iso ? (Date.now()-new Date(iso).getTime())/86400000 : 0;
const addMonthsDate = (iso,m) => { const d=new Date(iso); d.setDate(d.getDate()+Math.round(m*30.44)); return d; };
function formatDuration(iso) {
  if (!iso) return "—";
  const h = getHoursOut(iso);
  if (h<1) return `${Math.round(h*60)}m`;
  if (h<24) return `${Math.round(h)}h`;
  return `${Math.floor(h/24)}d ${Math.round(h%24)}h`;
}
function fmtDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
}

// ─── Shared UI ────────────────────────────────────────────────────────────────
const BADGE = {
  green: {bg:"#EAF3DE",fg:"#3B6D11"}, red:   {bg:"#FCEBEB",fg:"#A32D2D"},
  amber: {bg:"#FAEEDA",fg:"#854F0B"}, blue:  {bg:"#E6F1FB",fg:"#185FA5"},
  purple:{bg:"#EEEDFE",fg:"#3C3489"}, teal:  {bg:"#E1F5EE",fg:"#085041"},
  gray:  {bg:"#F1EFE8",fg:"#5F5E5A"},
};
function Badge({label,color="gray"}) {
  const c=BADGE[color]||BADGE.gray;
  return <span style={{background:c.bg,color:c.fg,padding:"2px 10px",borderRadius:12,fontSize:11,fontWeight:700,whiteSpace:"nowrap"}}>{label}</span>;
}
function MBadge({s}) {
  const m={"Good":"green","Needs Service":"amber","Out of Service":"red","Lost":"gray"};
  return <Badge label={s} color={m[s]||"gray"} />;
}
function SBadge({status,hrs}) {
  if (status==="available") return <Badge label="Available" color="green"/>;
  if (status==="checked_out"&&hrs>48) return <Badge label="Past Due" color="red"/>;
  if (status==="checked_out") return <Badge label="Checked Out" color="amber"/>;
  return <Badge label={status} color="gray"/>;
}

const IS = {width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #ddd",fontSize:13,boxSizing:"border-box",marginTop:4,fontFamily:"inherit",background:"#fff",outline:"none"};
const LS = {fontSize:11,color:"#555",fontWeight:700,display:"block",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"};
function Field({label,children,half}) {
  return <div style={{marginBottom:14,flex:half?"1":undefined}}><label style={LS}>{label}</label>{children}</div>;
}
function Modal({title,onClose,children}) {
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
      <div style={{background:"#fff",borderRadius:16,padding:28,minWidth:340,maxWidth:540,width:"92%",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.2)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <h3 style={{margin:0,fontSize:17,fontWeight:700}}>{title}</h3>
          <button onClick={onClose} style={{border:"none",background:"none",cursor:"pointer",fontSize:24,color:"#888",lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function QRDisplay({id,size=48,showLabel=true,subLabel}) {
  const ref=useRef(null);
  useEffect(()=>{
    if(window.QRCode&&ref.current){
      ref.current.innerHTML="";
      new window.QRCode(ref.current,{text:`TOOL:${id}`,width:size,height:size,colorDark:"#1a1a1a",colorLight:"#ffffff",correctLevel:window.QRCode.CorrectLevel.H});
    }
  },[id,size]);
  return (
    <div style={{textAlign:"center"}}>
      <div ref={ref} style={{display:"inline-block",background:"#fff",padding:2,borderRadius:4,border:"1px solid #e0e0e0"}}/>
      {showLabel&&<div style={{marginTop:3,fontSize:10,fontWeight:700,letterSpacing:0.5}}>{id}</div>}
      {showLabel&&subLabel&&<div style={{fontSize:9,color:"#888"}}>{subLabel}</div>}
    </div>
  );
}

function PrintLabel({item,onClose}) {
  const name=item.name||item.type||`${item.brand} ${item.model}`;
  const loc=item.location||item.person||"";
  const handlePrint=()=>{
    const w=window.open("","_blank");
    w.document.write(`<html><head><title>Label</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>
    <style>body{margin:0;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .lbl{width:2.5in;height:1in;border:1.5px dashed #333;padding:6px 8px;display:flex;flex-direction:row;align-items:center;gap:8px}
    .ti{font-size:12px;font-weight:bold}.tn{font-size:9px;margin-top:2px;line-height:1.3}.loc{font-size:8px;color:#555;margin-top:3px}
    @media print{@page{size:2.5in 1in;margin:0}body{min-height:unset}}</style></head>
    <body><div class="lbl"><div id="qr"></div><div><div class="ti">${item.id}</div><div class="tn">${name}</div><div class="loc">${loc}</div></div></div>
    <script>new QRCode(document.getElementById('qr'),{text:'TOOL:${item.id}',width:48,height:48,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});setTimeout(()=>window.print(),800);<\/script></body></html>`);
    w.document.close();
  };
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}}>
      <div style={{background:"#fff",borderRadius:14,padding:26,minWidth:290,maxWidth:360,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <h3 style={{margin:"0 0 16px",fontSize:16,fontWeight:700}}>Print QR Label</h3>
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",border:"1.5px dashed #333",borderRadius:6,background:"#fff",marginBottom:14}}>
          <QRDisplay id={item.id} size={48} showLabel={false}/>
          <div><div style={{fontFamily:"monospace",fontWeight:700,fontSize:12}}>{item.id}</div><div style={{fontSize:10,marginTop:2}}>{name}</div><div style={{fontSize:9,color:"#888",marginTop:2}}>{loc}</div></div>
        </div>
        <div style={{fontSize:11,color:"#aaa",textAlign:"center",marginBottom:14}}>2.5" × 1" label · QR = 0.5" × 0.5"</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"9px 0",borderRadius:8,border:"1px solid #ddd",background:"#f5f5f5",cursor:"pointer",fontSize:13}}>Cancel</button>
          <button onClick={handlePrint} style={{flex:1,padding:"9px 0",borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>Print</button>
        </div>
      </div>
    </div>
  );
}

function EmailPreview({subject,body,onClose}) {
  return (
    <Modal title="Email Preview" onClose={onClose}>
      <div style={{background:"#f8f8f8",borderRadius:8,padding:14,fontFamily:"monospace",fontSize:11,whiteSpace:"pre-wrap",lineHeight:1.8,border:"1px solid #e0e0e0",maxHeight:320,overflowY:"auto"}}>
        {`Subject: ${subject}\n\n${body}`}
      </div>
      <div style={{marginTop:12,padding:"10px 14px",background:"#EAF3DE",borderRadius:8,fontSize:12,color:"#3B6D11"}}>
        ✓ In production this sends via your email service (SMTP / SendGrid / etc.)
      </div>
      <button onClick={onClose} style={{marginTop:12,width:"100%",padding:"10px 0",borderRadius:8,border:"none",background:"#1a1a1a",color:"#fff",cursor:"pointer",fontSize:13,fontWeight:700}}>Close</button>
    </Modal>
  );
}

function LoginScreen({onLogin}) {
  const [user,setUser]=useState("");
  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const [showPass,setShowPass]=useState(false);
  const [loading,setLoading]=useState(false);

  const handleSubmit=async(e)=>{
    e.preventDefault();
    setErr("");setLoading(true);
    try {
      const found = await API('/login','POST',{username:user,password:pass});
      onLogin(found);
    } catch {
      setErr("Invalid username or password.");
    }
    setLoading(false);
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 50%,#1a1a1a 100%)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'IBM Plex Mono','Courier New',monospace",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:40}}>
          <div style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:64,height:64,background:"#f0ede8",borderRadius:16,marginBottom:16,fontSize:28}}>🔧</div>
          <div style={{fontSize:10,letterSpacing:"0.2em",color:"#666",textTransform:"uppercase",marginBottom:6}}>IEM Warehouse</div>
          <h1 style={{fontSize:20,fontWeight:700,color:"#fff",lineHeight:1.2}}>Tool, PPE &<br/>Calibration Tracker</h1>
        </div>
        <div style={{background:"#fff",borderRadius:20,padding:36,boxShadow:"0 32px 80px rgba(0,0,0,0.4)"}}>
          <h2 style={{fontSize:16,fontWeight:700,marginBottom:6,color:"#1a1a1a"}}>Sign in</h2>
          <p style={{fontSize:12,color:"#aaa",marginBottom:24}}>Enter your credentials to access the tracker.</p>
          <form onSubmit={handleSubmit}>
            <Field label="Username">
              <input style={{...IS,marginTop:6}} placeholder="Enter username" value={user} onChange={e=>{setUser(e.target.value);setErr("");}} autoFocus autoComplete="username"/>
            </Field>
            <Field label="Password">
              <div style={{position:"relative",marginTop:6}}>
                <input style={{...IS,paddingRight:44}} type={showPass?"text":"password"} placeholder="Enter password" value={pass} onChange={e=>{setPass(e.target.value);setErr("");}} autoComplete="current-password"/>
                <button type="button" onClick={()=>setShowPass(p=>!p)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",border:"none",background:"none",cursor:"pointer",fontSize:14,color:"#aaa",padding:"4px"}}>
                  {showPass?"🙈":"👁"}
                </button>
              </div>
            </Field>
            {err&&<div style={{padding:"10px 14px",background:"#FCEBEB",border:"1px solid #F7C1C1",borderRadius:8,fontSize:12,color:"#A32D2D",marginBottom:14}}>{err}</div>}
            <button type="submit" disabled={loading||!user||!pass} style={{width:"100%",padding:"12px 0",borderRadius:10,border:"none",background:loading||!user||!pass?"#ccc":"#1a1a1a",color:"#fff",cursor:loading||!user||!pass?"not-allowed":"pointer",fontSize:14,fontWeight:700,fontFamily:"inherit",transition:"background 0.2s",marginTop:4}}>
              {loading?"Signing in…":"Sign In →"}
            </button>
          </form>
          <div style={{marginTop:24,paddingTop:20,borderTop:"1px solid #f0ede8",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {[{username:"IEMadmin",password:"admin123",role:"admin"},{username:"IEM",password:"IEM123",role:"nonadmin"}].map(u=>(
              <div key={u.username} style={{padding:"10px 12px",background:"#f8f5f0",borderRadius:10,border:"1px solid #ece9e4"}}>
                <div style={{fontSize:10,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:4}}>{u.role==="admin"?"Admin":"Staff"}</div>
                <div style={{fontSize:12,fontWeight:700,color:"#1a1a1a"}}>{u.username}</div>
                <div style={{fontSize:11,color:"#888",marginTop:1}}>pw: {u.password}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#444"}}>IEM Warehouse Management System</div>
      </div>
    </div>
  );
}

function ManagementTab({categories,setCategories,isAdmin}) {
  const [newCat,setNewCat]=useState("");
  const [editIdx,setEditIdx]=useState(null);
  const [editVal,setEditVal]=useState("");
  const addCat=async()=>{
    if(!newCat.trim()||categories.includes(newCat.trim()))return;
    const cats=await API('/categories','POST',{name:newCat.trim()});
    setCategories(cats);setNewCat("");
  };
  const delCat=async(c)=>{
    const cats=await API(`/categories/${encodeURIComponent(c)}`,'DELETE');
    setCategories(cats);
  };
  const saveEdit=async(c,i)=>{
    if(!editVal.trim())return;
    // We'll delete old and add new
    let cats=await API(`/categories/${encodeURIComponent(c)}`,'DELETE');
    cats=await API('/categories','POST',{name:editVal.trim()});
    setCategories(cats);setEditIdx(null);
  };
  return (
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,alignItems:"start"}}>
      <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",overflow:"hidden"}}>
        <div style={{padding:"16px 20px",borderBottom:"1px solid #e8e5e0"}}>
          <div style={{fontWeight:700,fontSize:14}}>Tool Categories</div>
          <div style={{fontSize:11,color:"#aaa",marginTop:3}}>Add, edit, or remove categories.</div>
        </div>
        <div style={{padding:"16px 20px"}}>
          {isAdmin&&<div style={{display:"flex",gap:8,marginBottom:14}}>
            <input value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat()} placeholder="New category name..." style={{...IS,marginTop:0,flex:1}}/>
            <button className="btn-primary" onClick={addCat}>+ Add</button>
          </div>}
          {categories.map((c,i)=>(
            <div key={c} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,marginBottom:6,background:"#f8f5f0",border:"1px solid #ece9e4"}}>
              {editIdx===i?(
                <><input value={editVal} onChange={e=>setEditVal(e.target.value)} style={{...IS,marginTop:0,flex:1,padding:"5px 8px",fontSize:12}} autoFocus/><button className="btn-success" onClick={()=>saveEdit(c,i)} style={{fontSize:11}}>Save</button><button className="btn-icon" onClick={()=>setEditIdx(null)} style={{fontSize:11}}>✕</button></>
              ):(
                <><span style={{flex:1,fontSize:13}}>{c}</span>{isAdmin&&<button className="btn-icon" onClick={()=>{setEditIdx(i);setEditVal(c);}} style={{fontSize:11}}>Edit</button>}{isAdmin&&!DEFAULT_CATEGORIES.includes(c)&&<button className="btn-danger" onClick={()=>delCat(c)} style={{fontSize:11}}>Delete</button>}</>
              )}
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",overflow:"hidden"}}>
          <div style={{padding:"16px 20px",borderBottom:"1px solid #e8e5e0"}}>
            <div style={{fontWeight:700,fontSize:14}}>Maintenance Status Reference</div>
          </div>
          <div style={{padding:"14px 20px"}}>
            {[{s:"Good",d:"Ready for checkout."},{s:"Needs Service",d:"Works but requires maintenance soon."},{s:"Out of Service",d:"Cannot be checked out."},{s:"Lost",d:"Cannot be located. Kept in records."}].map(r=>(
              <div key={r.s} style={{display:"flex",alignItems:"flex-start",gap:12,marginBottom:10,paddingBottom:10,borderBottom:"1px solid #f0ede8"}}>
                <MBadge s={r.s}/><div style={{fontSize:12,color:"#666",lineHeight:1.55,flex:1}}>{r.d}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",padding:"16px 20px"}}>
          <div style={{fontWeight:700,fontSize:14,marginBottom:12}}>Alert Thresholds</div>
          {[{color:"#EAF3DE",border:"#C0DD97",text:"#27500A",icon:"🦺",l:"PPE replacement reminder",v:`${PPE_MONTHS} months from issue date`},{color:"#FAEEDA",border:"#FAC775",text:"#633806",icon:"📡",l:"Calibration reminder",v:`${CAL_WARN_DAYS} days before due date`},{color:"#FCEBEB",border:"#F7C1C1",text:"#791F1F",icon:"⏱",l:"Tool overdue reminder",v:"48 hours after checkout"}].map(r=>(
            <div key={r.l} style={{padding:"11px 14px",background:r.color,borderRadius:9,border:`1px solid ${r.border}`,fontSize:12,color:r.text,marginBottom:8}}>
              {r.icon} <strong>{r.l}</strong> — {r.v}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function PPEMetersTab({ppeList,setPpeList,meters,setMeters,isAdmin}) {
  const [sub,setSub]=useState("PPE");
  const [addPPE,setAddPPE]=useState(false);
  const [addMeter,setAddMeter]=useState(false);
  const [emailPv,setEmailPv]=useState(null);
  const [updateCal,setUpdateCal]=useState(null);
  const [newCalDate,setNewCalDate]=useState("");
  const [printItem,setPrintItem]=useState(null);
  const [ppeF,setPpeF]=useState({id:"",type:"Hard Hat",person:"",email:"",issuedAt:new Date().toISOString().slice(0,10),size:"",color:"",notes:""});
  const [mF,setMF]=useState({id:"",brand:"",model:"",serial:"",person:"",email:"",issuedAt:new Date().toISOString().slice(0,10),calDue:"",calInterval:365,notes:""});

  const ppeOv=(iso)=>getDaysSince(iso)>=PPE_MONTHS*30.44;
  const ppeSn=(iso)=>{ const d=getDaysSince(iso); return d>=PPE_MONTHS*30.44-14&&d<PPE_MONTHS*30.44; };
  const calOv=(iso)=>getDaysUntil(iso)!==null&&getDaysUntil(iso)<0;
  const calSn=(iso)=>{ const d=getDaysUntil(iso); return d!==null&&d>=0&&d<=CAL_WARN_DAYS; };
  const ppeAlerts=ppeList.filter(p=>ppeOv(p.issuedAt)||ppeSn(p.issuedAt)).length;
  const calAlerts=meters.filter(m=>calOv(m.calDue)||calSn(m.calDue)).length;

  const submitPPE=async()=>{
    if(!ppeF.person.trim())return;
    const id=ppeF.id.trim()||`PPE${String(ppeList.length+1).padStart(3,"0")}`;
    const list=await API('/ppe','POST',{...ppeF,id,issuedAt:new Date(ppeF.issuedAt).toISOString(),reminderSent:false});
    setPpeList(list);
    setPpeF({id:"",type:"Hard Hat",person:"",email:"",issuedAt:new Date().toISOString().slice(0,10),size:"",color:"",notes:""});
    setAddPPE(false);
  };
  const submitMeter=async()=>{
    if(!mF.person.trim()||!mF.brand||!mF.calDue)return;
    const id=mF.id.trim()||`CAL${String(meters.length+1).padStart(3,"0")}`;
    const list=await API('/meters','POST',{...mF,id,issuedAt:new Date(mF.issuedAt).toISOString(),calDue:new Date(mF.calDue).toISOString(),calInterval:Number(mF.calInterval),reminderSent:false});
    setMeters(list);
    setMF({id:"",brand:"",model:"",serial:"",person:"",email:"",issuedAt:new Date().toISOString().slice(0,10),calDue:"",calInterval:365,notes:""});
    setAddMeter(false);
  };
  const reIssue=async(id)=>{ const list=await API(`/ppe/${id}/reissue`,'PATCH'); setPpeList(list); };
  const doUpdateCal=async(m)=>{
    if(!newCalDate)return;
    const list=await API(`/meters/${m.id}/caldate`,'PATCH',{calDue:new Date(newCalDate).toISOString()});
    setMeters(list);setUpdateCal(null);setNewCalDate("");
  };
  const delPPE=async(id)=>{ if(window.confirm("Delete this PPE record?")){ const list=await API(`/ppe/${id}`,'DELETE'); setPpeList(list); }};
  const delMeter=async(id)=>{ if(window.confirm("Delete this meter record?")){ const list=await API(`/meters/${id}`,'DELETE'); setMeters(list); }};

  const ppeEmail=(item)=>({
    subject:`[PPE Reminder] Time to Replace Your ${item.type}`,
    body:`Hi ${item.person},\n\nThis is your scheduled reminder that your PPE is due for replacement.\n\n  Item: ${item.type}\n  ID: ${item.id}\n  Size: ${item.size||"N/A"} · Color: ${item.color||"N/A"}\n  Issued: ${fmtDate(item.issuedAt)}\n  Replacement Due: ${fmtDate(addMonthsDate(item.issuedAt,PPE_MONTHS).toISOString())}\n\nPlease see the warehouse manager to receive your replacement ${item.type}.\n\nThank you,\nIEM Warehouse Management`,
  });
  const calEmail=(m)=>({
    subject:`[Calibration Reminder] ${m.brand} ${m.model} — Cal Due ${fmtDate(m.calDue)}`,
    body:`Hi ${m.person},\n\nYour multimeter is due for calibration.\n\n  Meter: ${m.brand} ${m.model}\n  Serial: ${m.serial}\n  ID: ${m.id}\n  Calibration Due: ${fmtDate(m.calDue)}\n\nPlease arrange to send your meter to the calibration lab before the due date.\n\nThank you,\nIEM Warehouse Management`,
  });

  const TD={padding:"9px 12px",borderBottom:"1px solid #ece9e4",fontSize:12,verticalAlign:"middle"};
  const TD_M={...TD,fontFamily:"monospace",fontWeight:700,fontSize:11};

  return (
    <div>
      <div style={{display:"flex",gap:0,marginBottom:16,borderBottom:"2px solid #e8e5e0"}}>

          </button>

        <div style={{flex:1}}/>
        {isAdmin&&sub==="PPE"&&<button className="btn-primary" onClick={()=>setAddPPE(true)}>+ Issue PPE</button>}
        {isAdmin&&sub==="Multimeters"&&<button className="btn-primary" onClick={()=>setAddMeter(true)}>+ Add Meter</button>}
      </div>

      {sub==="PPE"&&(
        <div>
          {ppeAlerts>0&&<div style={{background:"#FCEBEB",border:"1px solid #F7C1C1",borderRadius:10,padding:"11px 15px",marginBottom:14,fontSize:12,color:"#791F1F"}}>⚠ {ppeAlerts} PPE item{ppeAlerts>1?"s":""} due or overdue for replacement.</div>}
          <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",overflow:"hidden",overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",width:"100%",minWidth:700}}>
              <thead><tr><th style={TH}>ID</th><th style={TH}>Type / Details</th><th style={TH}>Person</th><th style={TH}>Email</th><th style={TH}>Issued</th><th style={TH}>Change Due</th><th style={TH}>Status</th><th style={TH}>Actions</th></tr></thead>
              <tbody>
                {ppeList.map(item=>{
                  const ov=ppeOv(item.issuedAt),sn=ppeSn(item.issuedAt);
                  const due=addMonthsDate(item.issuedAt,PPE_MONTHS);

                    <tr key={item.id} style={{background:ov?"#FFFAF9":sn?"#FFFDF5":"transparent"}}>
                      <td style={TD_M}>{item.id}</td>
                      <td style={TD}>{item.type}{item.size?` (${item.size})`:""}{item.color?` · ${item.color}`:""}</td>
                      <td style={TD}>{item.person}</td>
                      <td style={{...TD,color:"#888",fontSize:11}}>{item.email||"—"}</td>
                      <td style={{...TD,fontSize:11}}>{fmtDate(item.issuedAt)}</td>

                        {isAdmin&&<button className="btn-danger" onClick={()=>delPPE(item.id)} style={{fontSize:10}}>Delete</button>}
                      </div></td>

              </tbody>
            </table>
            {ppeList.length===0&&<div style={{padding:28,textAlign:"center",color:"#aaa",fontSize:13}}>No PPE issued yet.{isAdmin?' Click "+ Issue PPE" to add.':""}</div>}

        </div>
      )}

      {sub==="Multimeters"&&(
        <div>
          {calAlerts>0&&<div style={{background:"#FAEEDA",border:"1px solid #FAC775",borderRadius:10,padding:"11px 15px",marginBottom:14,fontSize:12,color:"#633806"}}>⚠ {calAlerts} meter{calAlerts>1?"s":""} require calibration attention.</div>}

            <table style={{borderCollapse:"collapse",width:"100%",minWidth:800}}>
              <thead><tr><th style={TH}>ID</th><th style={TH}>Meter</th><th style={TH}>Serial</th><th style={TH}>Person</th><th style={TH}>Email</th><th style={TH}>Cal Due</th><th style={TH}>Days Left</th><th style={TH}>Status</th><th style={TH}>Actions</th></tr></thead>
              <tbody>
                {meters.map(m=>{

                  const dl=getDaysUntil(m.calDue);

                      <td style={TD_M}>{m.id}</td>

                      <td style={{...TD,fontSize:11,color:"#888",fontFamily:"monospace"}}>{m.serial}</td>
                      <td style={TD}>{m.person}</td>
                      <td style={{...TD,fontSize:11,color:"#888"}}>{m.email||"—"}</td>
                      <td style={{...TD,fontSize:11,fontWeight:ov?700:400,color:ov?"#A32D2D":sn?"#854F0B":"#555"}}>{fmtDate(m.calDue)}</td>
                      <td style={{...TD,fontSize:11,fontWeight:700,color:ov?"#A32D2D":sn?"#854F0B":"#3B6D11"}}>{ov?`${Math.abs(Math.round(dl))}d overdue`:`${Math.round(dl)}d`}</td>
                      <td style={TD}>{ov?<Badge label="Overdue" color="red"/>:sn?<Badge label="Due Soon" color="amber"/>:<Badge label="Current" color="green"/>}</td>

                        <button className="btn-icon" onClick={()=>setEmailPv(calEmail(m))} style={{fontSize:10}}>✉ Email</button>
                        {isAdmin&&<button className="btn-success" onClick={()=>{setUpdateCal(m);setNewCalDate("");}} style={{fontSize:10}}>Update Cal</button>}
                        <button className="btn-icon" onClick={()=>setPrintItem({...m,name:`${m.brand} ${m.model}`,location:m.person})} style={{fontSize:10}}>🖨</button>

            {meters.length===0&&<div style={{padding:28,textAlign:"center",color:"#aaa",fontSize:13}}>No meters added yet.</div>}

      {addPPE&&(

            <Field label="Full Name *" half><input style={IS} placeholder="Jane Doe" value={ppeF.person} onChange={e=>setPpeF(p=>({...p,person:e.target.value}))}/></Field>
            <Field label="Email" half><input style={IS} type="email" placeholder="jane@company.com" value={ppeF.email} onChange={e=>setPpeF(p=>({...p,email:e.target.value}))}/></Field>

          <div style={{display:"flex",gap:10}}>
            <Field label="Size" half><input style={IS} placeholder="M / L / XL" value={ppeF.size} onChange={e=>setPpeF(p=>({...p,size:e.target.value}))}/></Field>
            <Field label="Color" half><input style={IS} placeholder="Yellow" value={ppeF.color} onChange={e=>setPpeF(p=>({...p,color:e.target.value}))}/></Field>
          </div>
          <Field label="Issue Date *"><input style={IS} type="date" value={ppeF.issuedAt} onChange={e=>setPpeF(p=>({...p,issuedAt:e.target.value}))}/></Field>
          <Field label="Notes"><input style={IS} placeholder="Optional notes" value={ppeF.notes} onChange={e=>setPpeF(p=>({...p,notes:e.target.value}))}/></Field>
          <div style={{padding:"10px 12px",background:"#E1F5EE",borderRadius:8,fontSize:11,color:"#085041",marginBottom:14}}>Replacement reminder fires at <strong>{PPE_MONTHS} months</strong> from issue date.</div>
          <div style={{display:"flex",gap:10}}><button className="btn-secondary" style={{flex:1}} onClick={()=>setAddPPE(false)}>Cancel</button><button className="btn-primary" style={{flex:1}} onClick={submitPPE}>Issue PPE</button></div>
        </Modal>
      )}

      {addMeter&&(
        <Modal title="Add Multimeter" onClose={()=>setAddMeter(false)}>
          <Field label="ID (auto-generated if blank)"><input style={IS} placeholder="CAL004" value={mF.id} onChange={e=>setMF(p=>({...p,id:e.target.value}))}/></Field>
          <div style={{display:"flex",gap:10}}>
            <Field label="Brand *" half><input style={IS} placeholder="Fluke" value={mF.brand} onChange={e=>setMF(p=>({...p,brand:e.target.value}))}/></Field>
            <Field label="Model *" half><input style={IS} placeholder="87V" value={mF.model} onChange={e=>setMF(p=>({...p,model:e.target.value}))}/></Field>
          </div>
          <Field label="Serial Number"><input style={IS} placeholder="FLK-0001" value={mF.serial} onChange={e=>setMF(p=>({...p,serial:e.target.value}))}/></Field>
          <div style={{display:"flex",gap:10}}>
            <Field label="Assigned To *" half><input style={IS} placeholder="Full name" value={mF.person} onChange={e=>setMF(p=>({...p,person:e.target.value}))}/></Field>
            <Field label="Email" half><input style={IS} type="email" placeholder="name@co.com" value={mF.email} onChange={e=>setMF(p=>({...p,email:e.target.value}))}/></Field>
          </div>
          <div style={{display:"flex",gap:10}}>
            <Field label="Cal Due Date *" half><input style={IS} type="date" value={mF.calDue} onChange={e=>setMF(p=>({...p,calDue:e.target.value}))}/></Field>
            <Field label="Cal Interval (days)" half><input style={IS} type="number" value={mF.calInterval} onChange={e=>setMF(p=>({...p,calInterval:e.target.value}))}/></Field>
          </div>
          <Field label="Notes"><input style={IS} placeholder="e.g. NIST traceable cert required" value={mF.notes} onChange={e=>setMF(p=>({...p,notes:e.target.value}))}/></Field>
          <div style={{padding:"10px 12px",background:"#FAEEDA",borderRadius:8,fontSize:11,color:"#633806",marginBottom:14}}>Calibration reminder fires <strong>{CAL_WARN_DAYS} days before</strong> the due date.</div>
          <div style={{display:"flex",gap:10}}><button className="btn-secondary" style={{flex:1}} onClick={()=>setAddMeter(false)}>Cancel</button><button className="btn-primary" style={{flex:1}} onClick={submitMeter}>Add Meter</button></div>
        </Modal>
      )}

      {updateCal&&(
        <Modal title={`Update Cal — ${updateCal.brand} ${updateCal.model}`} onClose={()=>setUpdateCal(null)}>
          <div style={{padding:"12px 14px",background:"#f8f5f0",borderRadius:8,fontSize:12,marginBottom:16}}>
            <div><strong>Serial:</strong> {updateCal.serial}</div>
            <div><strong>Assigned to:</strong> {updateCal.person}</div>
            <div><strong>Previous cal due:</strong> {fmtDate(updateCal.calDue)}</div>
          </div>
          <Field label="New Calibration Due Date *"><input style={IS} type="date" value={newCalDate} onChange={e=>setNewCalDate(e.target.value)}/></Field>
          <div style={{display:"flex",gap:10,marginTop:8}}><button className="btn-secondary" style={{flex:1}} onClick={()=>setUpdateCal(null)}>Cancel</button><button className="btn-primary" style={{flex:1}} onClick={()=>doUpdateCal(updateCal)}>Save Date</button></div>
        </Modal>
      )}

      {emailPv&&<EmailPreview subject={emailPv.subject} body={emailPv.body} onClose={()=>setEmailPv(null)}/>}
      {printItem&&<PrintLabel item={printItem} onClose={()=>setPrintItem(null)}/>}
    </div>
  );
}

              <div style={{fontSize:24,marginBottom:5}}>{sec.icon}</div>

                </>);})()}
              </div>
            </div>
          </div>

    </div>
  );

  const [filterMs,setFilterMs]=useState("All");
  const [newTool,setNewTool]=useState({id:"",name:"",category:"Power Tools",location:"",maintainStatus:"Good"});
  const [coForm,setCoForm]=useState({name:"",email:""});

  const isAdmin = currentUser?.role==="admin";
  const TABS = isAdmin ? ["Dashboard","Tools","Check Out","Past Due","PPE & Meters","People","QR Scanner","Management","SOP"] : ["Dashboard","Tools","Check Out","Past Due","PPE & Meters","People","QR Scanner","SOP"];

  const loadAll = async () => {
    const [t,c,p,m] = await Promise.all([
      API('/tools'), API('/categories'), API('/ppe'), API('/meters')
    ]);
    setTools(t); setCategories(c); setPpeList(p); setMeters(m);
    setLoading(false);
  };

  useEffect(()=>{ if(currentUser) loadAll(); },[currentUser]);

  const handleLogin=(user)=>{ setCurrentUser(user); setTab("Dashboard"); };
  const handleLogout=()=>{ setCurrentUser(null); setLoading(true); };

  const handleResetData=async()=>{
    if(!window.confirm("Reset ALL data to factory sample data? This cannot be undone."))return;
    const data=await API('/reset','POST');
    setTools(data.tools); setCategories(data.categories); setPpeList(data.ppe); setMeters(data.meters);
  };

  if(!currentUser) return <LoginScreen onLogin={handleLogin}/>;
  if(loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"monospace",color:"#aaa",fontSize:13}}>Loading data from server…</div>;

  const pastDue=tools.filter(t=>t.status==="checked_out"&&getHoursOut(t.checkedOutAt)>48);
  const checkedOut=tools.filter(t=>t.status==="checked_out");
  const available=tools.filter(t=>t.status==="available"&&t.maintainStatus!=="Out of Service"&&t.maintainStatus!=="Lost");
  const ppeAlerts=ppeList.filter(p=>getDaysSince(p.issuedAt)>=PPE_MONTHS*30.44-14).length;
  const calAlerts=meters.filter(m=>getDaysUntil(m.calDue)!==null&&getDaysUntil(m.calDue)<=CAL_WARN_DAYS).length;
  const totalAlerts=pastDue.length+ppeAlerts+calAlerts;

  const peopleMap={};
  tools.forEach(t=>{
    if(t.checkedOutTo){
      if(!peopleMap[t.checkedOutTo]) peopleMap[t.checkedOutTo]={name:t.checkedOutTo,email:t.checkedOutEmail,tools:[],history:[]};
      if(t.status==="checked_out") peopleMap[t.checkedOutTo].tools.push(t);
    }
    (t.history||[]).forEach(h=>{
      if(!peopleMap[h.person]) peopleMap[h.person]={name:h.person,email:h.email,tools:[],history:[]};
      peopleMap[h.person].history.push({...h,toolId:t.id,toolName:t.name});
    });
  });

  const doCheckout=async(tool)=>{
    if(!coForm.name.trim())return;
    const list=await API(`/tools/${tool.id}/checkout`,'POST',{name:coForm.name,email:coForm.email});
    setTools(list); setCoForm({name:"",email:""}); setCheckoutOpen(null);
  };
  const doReturn=async(tool)=>{
    const list=await API(`/tools/${tool.id}/return`,'POST');
    setTools(list); setReturnOpen(null);
  };
  const doAddTool=async()=>{
    if(!newTool.id.trim()||!newTool.name.trim())return;
    const list=await API('/tools','POST',newTool);
    setTools(list);
    setNewTool({id:"",name:"",category:"Power Tools",location:"",maintainStatus:"Good"});
    setAddToolOpen(false);
  };
  const doDeleteTool=async(id)=>{
    if(window.confirm("Delete this tool from the system?")){
      const list=await API(`/tools/${id}`,'DELETE');
      setTools(list);
    }
  };
  const doMaintainChange=async(id, maintainStatus)=>{
    const list=await API(`/tools/${id}/maintain`,'PATCH',{maintainStatus});
    setTools(list);
  };

  const doImport=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async(evt)=>{
      const wb=XLSX_LIB.read(evt.target.result,{type:"binary"});
      const data=XLSX_LIB.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const imported=data.map(row=>({id:String(row.id||row.ID||row["Tool ID"]||"").trim(),name:String(row.name||row.Name||row["Tool Name"]||"").trim(),category:String(row.category||row.Category||"Other").trim(),location:String(row.location||row.Location||"").trim(),maintainStatus:"Good",status:"available",checkedOutTo:null,checkedOutEmail:null,checkedOutAt:null,emailSent:false,history:[]})).filter(t=>t.id&&t.name);
      const list=await API('/tools/import','POST',imported);
      setTools(list);
    };
    reader.readAsBinaryString(file);e.target.value="";
  };
  const doExport=()=>{
    const ts=tools.map(t=>({"Tool ID":t.id,Name:t.name,Category:t.category,Location:t.location,Maintenance:t.maintainStatus,Status:t.status==="available"?"Available":"Checked Out","Checked Out To":t.checkedOutTo||"",Email:t.checkedOutEmail||"","Checked Out Date":t.checkedOutAt?new Date(t.checkedOutAt).toLocaleString():"","Duration":t.checkedOutAt?formatDuration(t.checkedOutAt):"","Past Due":getHoursOut(t.checkedOutAt)>48?"YES":""}));
    const hist=[];tools.forEach(t=>(t.history||[]).forEach(h=>hist.push({"Tool ID":t.id,"Tool Name":t.name,Person:h.person,Email:h.email,"Checked Out":new Date(h.checkedOutAt).toLocaleString(),Returned:new Date(h.returnedAt).toLocaleString(),Duration:formatDuration(h.checkedOutAt)})));
    const ppeS=ppeList.map(p=>({ID:p.id,Type:p.type,Person:p.person,Email:p.email,Size:p.size,Color:p.color,Issued:fmtDate(p.issuedAt),"Change Due":fmtDate(addMonthsDate(p.issuedAt,PPE_MONTHS).toISOString()),Notes:p.notes}));
    const calS=meters.map(m=>({ID:m.id,Brand:m.brand,Model:m.model,Serial:m.serial,Person:m.person,Email:m.email,"Cal Due":fmtDate(m.calDue),"Interval (days)":m.calInterval,Notes:m.notes}));
    const wb=XLSX_LIB.utils.book_new();
    XLSX_LIB.utils.book_append_sheet(wb,XLSX_LIB.utils.json_to_sheet(ts),"Tools");
    if(hist.length) XLSX_LIB.utils.book_append_sheet(wb,XLSX_LIB.utils.json_to_sheet(hist),"Tool History");
    if(ppeS.length) XLSX_LIB.utils.book_append_sheet(wb,XLSX_LIB.utils.json_to_sheet(ppeS),"PPE");
    if(calS.length) XLSX_LIB.utils.book_append_sheet(wb,XLSX_LIB.utils.json_to_sheet(calS),"Multimeters");
    XLSX_LIB.writeFile(wb,"tool-ppe-cal-tracker.xlsx");
  };
  const doScan=()=>{
    const id=prompt("Enter Tool ID (e.g. T001):");if(!id)return;
    const clean=id.replace("TOOL:","").trim().toUpperCase();
    setScanResult(tools.find(t=>t.id.toUpperCase()===clean)||{id:clean,status:"unknown"});
  };
  const filtered=tools.filter(t=>{
    const q=search.toLowerCase();
    return(!q||t.name.toLowerCase().includes(q)||t.id.toLowerCase().includes(q)||(t.checkedOutTo||"").toLowerCase().includes(q))&&
      (filterCat==="All"||t.category===filterCat)&&
      (filterMs==="All"||t.maintainStatus===filterMs||(filterMs==="checked_out"&&t.status==="checked_out")||(filterMs==="available"&&t.status==="available"));
  });
  const overdueEmail=(t)=>({
    subject:`[OVERDUE] Tool Return Reminder — ${t.name}`,
    body:`Hi ${t.checkedOutTo},\n\nThis tool has not been returned and is past the 48-hour checkout period:\n\n  Tool: ${t.name}\n  Tool ID: ${t.id}\n  Checked Out: ${new Date(t.checkedOutAt).toLocaleString()}\n  Duration: ${formatDuration(t.checkedOutAt)}\n\nPlease return to ${t.location} as soon as possible.\n\nThank you,\nIEM Warehouse Management`,
  });

  return (
    <div style={{minHeight:"100vh",background:"#f0ede8",fontFamily:"'IBM Plex Mono','Courier New',monospace"}}>
      <style>{`
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:#f0ede8}::-webkit-scrollbar-thumb{background:#c8c5be;border-radius:3px}
        table{border-collapse:collapse;width:100%}
        tr:hover td{background:#f8f5f0}
        input,select{outline:none}input:focus,select:focus{border-color:#1a1a1a!important;box-shadow:0 0 0 2px rgba(0,0,0,0.08)}
        .btn-primary{padding:8px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
        .btn-secondary{padding:8px 16px;background:#fff;color:#333;border:1px solid #ddd;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
        .btn-danger{padding:5px 10px;background:#FCEBEB;color:#A32D2D;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
        .btn-success{padding:5px 10px;background:#EAF3DE;color:#3B6D11;border:none;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
        .btn-icon{padding:5px 9px;background:transparent;border:1px solid #ddd;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;color:#555;white-space:nowrap}
        .btn-icon:hover{background:#f8f5f0}
        .btn-primary:hover{background:#333}
        .admin-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#EEEDFE;color:#3C3489;border-radius:10px;font-size:10px;font-weight:700}
        .staff-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#EAF3DE;color:#3B6D11;border-radius:10px;font-size:10px;font-weight:700}
      `}</style>

      <div style={{background:"#1a1a1a",color:"#fff",padding:"0 20px"}}>
        <div style={{maxWidth:1280,margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0 0",flexWrap:"wrap",gap:10}}>
            <div>
              <div style={{fontSize:9,letterSpacing:"0.2em",color:"#555",textTransform:"uppercase",marginBottom:3}}>IEM Warehouse Management System</div>
              <div style={{fontSize:17,fontWeight:700,letterSpacing:"-0.02em"}}>Tool, PPE & Calibration Date Tracker</div>
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {isAdmin&&(
                <>
                  <label style={{padding:"7px 12px",background:"#2a2a2a",color:"#bbb",borderRadius:8,fontSize:11,cursor:"pointer",border:"1px solid #444"}}>
                    ↑ Import Excel<input type="file" accept=".xlsx,.xls,.csv" onChange={doImport} style={{display:"none"}}/>
                  </label>
                  <button className="btn-icon" onClick={doExport} style={{background:"#2a2a2a",border:"1px solid #444",color:"#bbb",padding:"7px 12px",fontSize:11}}>↓ Export</button>
                  <button className="btn-primary" onClick={()=>setAddToolOpen(true)} style={{background:"#f0ede8",color:"#1a1a1a",fontSize:11}}>+ Add Tool</button>
                </>
              )}
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px",background:"#2a2a2a",borderRadius:8,border:"1px solid #444"}}>
                <span className={isAdmin?"admin-badge":"staff-badge"} style={{fontSize:10}}>
                  {isAdmin?"🔐 Admin":"👤 Staff"}
                </span>
                <span style={{fontSize:12,color:"#ccc"}}>{currentUser.username}</span>
                <button onClick={handleLogout} style={{padding:"3px 8px",background:"transparent",border:"1px solid #555",borderRadius:5,color:"#888",cursor:"pointer",fontSize:10,fontFamily:"inherit"}}>Sign out</button>
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:0,marginTop:14,overflowX:"auto"}}>
            {TABS.map(t=>(
              <button key={t} onClick={()=>setTab(t)} style={{padding:"9px 13px",background:"transparent",border:"none",borderBottom:tab===t?"2px solid #fff":"2px solid transparent",color:tab===t?"#fff":"#666",cursor:"pointer",fontSize:11,fontWeight:tab===t?700:400,fontFamily:"inherit",whiteSpace:"nowrap",transition:"color 0.15s"}}>
                {t}
                {t==="Past Due"&&pastDue.length>0&&<span style={{marginLeft:5,background:"#A32D2D",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:9}}>{pastDue.length}</span>}
                {t==="PPE & Meters"&&(ppeAlerts+calAlerts)>0&&<span style={{marginLeft:5,background:"#854F0B",color:"#fff",borderRadius:10,padding:"1px 5px",fontSize:9}}>{ppeAlerts+calAlerts}</span>}
              </button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:1280,margin:"0 auto",padding:20}}>

        {tab==="Dashboard"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}}>
              {[{l:"Total Tools",v:tools.length,c:"#1a1a1a"},{l:"Available",v:available.length,c:"#3B6D11"},{l:"Checked Out",v:checkedOut.length,c:"#854F0B"},{l:"Past Due (48h+)",v:pastDue.length,c:"#A32D2D"},{l:"Needs Service",v:tools.filter(t=>t.maintainStatus==="Needs Service").length,c:"#633806"},{l:"Out of Service",v:tools.filter(t=>t.maintainStatus==="Out of Service").length,c:"#5F5E5A"},{l:"PPE Alerts",v:ppeAlerts,c:"#3C3489"},{l:"Cal Alerts",v:calAlerts,c:"#854F0B"}].map(s=>(
                <div key={s.l} style={{background:"#fff",borderRadius:10,padding:"14px 16px",border:"1px solid #e8e5e0"}}>
                  <div style={{fontSize:9,color:"#aaa",letterSpacing:"0.07em",textTransform:"uppercase",marginBottom:5}}>{s.l}</div>
                  <div style={{fontSize:24,fontWeight:700,color:s.c}}>{s.v}</div>
                </div>
              ))}
            </div>
            {totalAlerts>0&&(
              <div style={{background:"#FCEBEB",border:"1px solid #F7C1C1",borderRadius:12,padding:"14px 18px",marginBottom:18}}>
                <div style={{fontWeight:700,color:"#A32D2D",marginBottom:10,fontSize:12}}>⚠ {totalAlerts} Alert{totalAlerts>1?"s":""} Requiring Action</div>
                {pastDue.map(t=>(
                  <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #F7C1C1",fontSize:11}}>
                    <span style={{color:"#791F1F"}}>🔧 <strong>{t.id}</strong> {t.name} — {t.checkedOutTo}</span>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{color:"#A32D2D",fontWeight:700}}>{formatDuration(t.checkedOutAt)}</span><button className="btn-danger" onClick={()=>setEmailTool(t)} style={{fontSize:10}}>✉ Email</button></div>
                  </div>
                ))}
                {ppeList.filter(p=>getDaysSince(p.issuedAt)>=PPE_MONTHS*30.44-14).map(p=>(
                  <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #F7C1C1",fontSize:11}}>
                    <span style={{color:"#791F1F"}}>🦺 PPE {p.type} — {p.person}</span>
                    <Badge label={getDaysSince(p.issuedAt)>=PPE_MONTHS*30.44?"Overdue":"Due Soon"} color={getDaysSince(p.issuedAt)>=PPE_MONTHS*30.44?"red":"amber"}/>
                  </div>
                ))}
                {meters.filter(m=>getDaysUntil(m.calDue)!==null&&getDaysUntil(m.calDue)<=CAL_WARN_DAYS).map(m=>(
                  <div key={m.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0",borderBottom:"1px solid #F7C1C1",fontSize:11}}>
                    <span style={{color:"#791F1F"}}>📡 {m.brand} {m.model} — {m.person}</span>
                    <Badge label={getDaysUntil(m.calDue)<0?"Overdue":`${Math.round(getDaysUntil(m.calDue))}d left`} color={getDaysUntil(m.calDue)<0?"red":"amber"}/>
                  </div>
                ))}
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div style={{background:"#fff",borderRadius:12,padding:18,border:"1px solid #e8e5e0"}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#aaa",marginBottom:12}}>Currently Checked Out</div>
                {checkedOut.length===0&&<div style={{color:"#ccc",fontSize:12}}>All tools available</div>}
                {checkedOut.map(t=>(
                  <div key={t.id} style={{display:"flex",justifyContent:"space-between",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #f0ede8"}}>
                    <div><div style={{fontWeight:600,fontSize:12}}>{t.name}</div><div style={{fontSize:10,color:"#888"}}>{t.checkedOutTo}</div></div>
                    <div style={{textAlign:"right"}}><SBadge status={t.status} hrs={getHoursOut(t.checkedOutAt)}/><div style={{marginTop:3,color:"#aaa",fontSize:10}}>{formatDuration(t.checkedOutAt)}</div></div>
                  </div>
                ))}
              </div>
              <div style={{background:"#fff",borderRadius:12,padding:18,border:"1px solid #e8e5e0"}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#aaa",marginBottom:12}}>Maintenance Overview</div>
                {["Good","Needs Service","Out of Service","Lost"].map(s=>{const count=tools.filter(t=>t.maintainStatus===s).length;if(!count)return null;return(
                  <div key={s} style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8,paddingBottom:8,borderBottom:"1px solid #f0ede8"}}><MBadge s={s}/><span style={{fontWeight:700,fontSize:13}}>{count} tool{count>1?"s":""}</span></div>
                );})}
                {tools.filter(t=>t.maintainStatus!=="Good").length===0&&<div style={{color:"#ccc",fontSize:12}}>All tools in Good condition</div>}
              </div>
            </div>
          </div>
        )}

        {tab==="Tools"&&(
          <div>
            <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
              <input placeholder="Search by name, ID, or person..." value={search} onChange={e=>setSearch(e.target.value)} style={{...IS,marginTop:0,flex:1,minWidth:180}}/>
              <select value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{...IS,marginTop:0,width:148}}><option value="All">All Categories</option>{categories.map(c=><option key={c}>{c}</option>)}</select>
              <select value={filterMs} onChange={e=>setFilterMs(e.target.value)} style={{...IS,marginTop:0,width:148}}><option value="All">All Statuses</option><option value="available">Available</option><option value="checked_out">Checked Out</option>{MAINTAIN_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}</select>
            </div>
            <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",overflow:"hidden",overflowX:"auto"}}>
              <table style={{minWidth:850}}>
                <thead><tr><th style={TH}>ID</th><th style={TH}>Name</th><th style={TH}>Category</th><th style={TH}>Location</th><th style={TH}>Maintenance</th><th style={TH}>Status</th><th style={TH}>Person</th><th style={TH}>Duration</th><th style={TH}>Actions</th></tr></thead>
                <tbody>
                  {filtered.map(t=>(
                    <tr key={t.id}>
                      <td style={TD_M}>{t.id}</td>
                      <td style={{...TD,fontWeight:600}}>{t.name}</td>
                      <td style={{...TD,color:"#888",fontSize:11}}>{t.category}</td>
                      <td style={{...TD,color:"#888",fontSize:11}}>{t.location}</td>
                      <td style={TD}>
                        {isAdmin?(
                          <select value={t.maintainStatus} onChange={e=>doMaintainChange(t.id,e.target.value)} style={{fontSize:11,padding:"3px 6px",borderRadius:6,border:"1px solid #ddd",fontFamily:"inherit",background:"#fff",cursor:"pointer"}}>
                            {MAINTAIN_STATUSES.map(s=><option key={s}>{s}</option>)}
                          </select>
                        ):<MBadge s={t.maintainStatus}/>}
                      </td>
                      <td style={TD}><SBadge status={t.status} hrs={getHoursOut(t.checkedOutAt)}/></td>
                      <td style={{...TD,fontSize:11}}>{t.checkedOutTo||"—"}</td>
                      <td style={{...TD,fontSize:11,color:getHoursOut(t.checkedOutAt)>48?"#A32D2D":"#666"}}>{formatDuration(t.checkedOutAt)}</td>
                      <td style={TD}>
                        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                          {t.status==="available"&&t.maintainStatus!=="Out of Service"&&t.maintainStatus!=="Lost"
                            ?<button className="btn-success" onClick={()=>setCheckoutOpen(t)}>Check Out</button>
                            :t.status==="checked_out"?<button className="btn-danger" onClick={()=>setReturnOpen(t)}>Return</button>
                            :<span style={{fontSize:10,color:"#aaa"}}>Unavailable</span>}
                          <button className="btn-icon" onClick={()=>setPrintTool(t)}>🖨</button>
                          {t.status==="checked_out"&&getHoursOut(t.checkedOutAt)>48&&<button className="btn-icon" onClick={()=>setEmailTool(t)} style={{color:"#A32D2D"}}>✉</button>}
                          {isAdmin&&<button className="btn-danger" onClick={()=>doDeleteTool(t.id)} style={{fontSize:10}}>Delete</button>}
                        </div>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
              {filtered.length===0&&<div style={{padding:28,textAlign:"center",color:"#aaa",fontSize:13}}>No tools found.</div>}
            </div>
          </div>
        )}

        {tab==="Check Out"&&(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:12}}>
            {available.map(t=>(
              <div key={t.id} style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",padding:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div><div style={{fontWeight:700,fontSize:13}}>{t.name}</div><div style={{fontSize:10,color:"#aaa",marginTop:2}}>{t.id} · {t.location}</div></div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,alignItems:"flex-end"}}><SBadge status="available"/><MBadge s={t.maintainStatus}/></div>
                </div>
                <div style={{display:"flex",justifyContent:"center",marginBottom:12}}><QRDisplay id={t.id} size={48} subLabel={t.name}/></div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn-primary" style={{flex:1}} onClick={()=>setCheckoutOpen(t)}>Check Out</button>
                  <button className="btn-icon" onClick={()=>setPrintTool(t)}>🖨</button>
                </div>
              </div>
            ))}
            {available.length===0&&<div style={{color:"#aaa",fontSize:13,padding:32}}>All tools are currently checked out or unavailable.</div>}
          </div>
        )}

        {tab==="Past Due"&&(
          pastDue.length===0
            ?<div style={{background:"#fff",borderRadius:12,padding:48,textAlign:"center",border:"1px solid #e8e5e0"}}>
               <div style={{fontSize:36,marginBottom:10}}>✓</div>
               <div style={{fontSize:16,fontWeight:700,color:"#3B6D11"}}>No overdue tools</div>
               <div style={{fontSize:12,color:"#aaa",marginTop:5}}>All tools returned within 48 hours</div>
             </div>
            :<div>
               <div style={{marginBottom:12,padding:"10px 14px",background:"#FCEBEB",borderRadius:10,fontSize:12,color:"#791F1F",border:"1px solid #F7C1C1"}}>{pastDue.length} tool{pastDue.length>1?"s":""} overdue — send reminders or mark returned.</div>
               <div style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",overflow:"hidden",overflowX:"auto"}}>
                 <table style={{minWidth:700}}>
                   <thead><tr><th style={TH}>ID</th><th style={TH}>Tool</th><th style={TH}>Person</th><th style={TH}>Email</th><th style={TH}>Checked Out</th><th style={TH}>Overdue By</th><th style={TH}>Actions</th></tr></thead>
                   <tbody>
                     {pastDue.map(t=>(
                       <tr key={t.id}>
                         <td style={TD_M}>{t.id}</td><td style={{...TD,fontWeight:600}}>{t.name}</td>
                         <td style={TD}>{t.checkedOutTo}</td><td style={{...TD,color:"#888",fontSize:11}}>{t.checkedOutEmail||"—"}</td>
                         <td style={{...TD,fontSize:11}}>{fmtDate(t.checkedOutAt)}</td><td style={{...TD,color:"#A32D2D",fontWeight:700}}>{formatDuration(t.checkedOutAt)}</td>
                         <td style={TD}><div style={{display:"flex",gap:5}}><button className="btn-danger" onClick={()=>setEmailTool(t)}>✉ Email</button><button className="btn-success" onClick={()=>setReturnOpen(t)}>Return</button></div></td>
                       </tr>
                     ))}
                   </tbody>
                 </table>
               </div>
             </div>
        )}

        {tab==="PPE & Meters"&&<PPEMetersTab ppeList={ppeList} setPpeList={setPpeList} meters={meters} setMeters={setMeters} isAdmin={isAdmin}/>}

        {tab==="People"&&(
          <div style={{display:"grid",gap:12}}>
            {Object.values(peopleMap).length===0&&<div style={{color:"#aaa",fontSize:13,padding:32}}>No checkout history yet.</div>}
            {Object.values(peopleMap).map(p=>{
              const ppeItems=ppeList.filter(x=>x.person===p.name);
              const meterItems=meters.filter(x=>x.person===p.name);
              return (
                <div key={p.name} style={{background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",padding:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <div style={{width:38,height:38,borderRadius:"50%",background:"#E6F1FB",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:13,color:"#185FA5"}}>{p.name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase()}</div>
                      <div><div style={{fontWeight:700,fontSize:14}}>{p.name}</div><div style={{fontSize:11,color:"#888"}}>{p.email||"No email"}</div></div>
                    </div>
                    <div style={{display:"flex",gap:14,textAlign:"center"}}>
                      {[{v:p.tools.length,l:"Out"},{v:p.history.length+p.tools.length,l:"Total"},{v:ppeItems.length,l:"PPE"},{v:meterItems.length,l:"Meters"}].map(s=>(
                        <div key={s.l}><div style={{fontSize:18,fontWeight:700}}>{s.v}</div><div style={{fontSize:9,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.04em"}}>{s.l}</div></div>
                      ))}
                    </div>
                  </div>
                  {p.tools.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:9,fontWeight:700,color:"#aaa",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>Currently Holding</div><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{p.tools.map(t=><div key={t.id} style={{padding:"3px 10px",background:"#f8f5f0",borderRadius:16,fontSize:11,border:"1px solid #e8e5e0"}}>{t.name} <span style={{color:"#aaa"}}>({formatDuration(t.checkedOutAt)})</span></div>)}</div></div>}
                  {(ppeItems.length>0||meterItems.length>0)&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>{ppeItems.map(x=><div key={x.id} style={{padding:"3px 10px",background:"#E1F5EE",borderRadius:16,fontSize:11,border:"1px solid #9FE1CB",color:"#085041"}}>🦺 {x.type}</div>)}{meterItems.map(x=><div key={x.id} style={{padding:"3px 10px",background:"#FAEEDA",borderRadius:16,fontSize:11,border:"1px solid #FAC775",color:"#633806"}}>📡 {x.brand} {x.model}</div>)}</div>}
                  {p.history.length>0&&(
                    <details><summary style={{fontSize:10,color:"#888",cursor:"pointer",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Checkout History ({p.history.length})</summary>
                      <table style={{marginTop:8,fontSize:11}}><thead><tr><th style={{...TH,fontSize:9}}>Tool</th><th style={{...TH,fontSize:9}}>Checked Out</th><th style={{...TH,fontSize:9}}>Returned</th><th style={{...TH,fontSize:9}}>Duration</th></tr></thead><tbody>{p.history.map((h,i)=><tr key={i}><td style={TD}>{h.toolName}</td><td style={TD}>{fmtDate(h.checkedOutAt)}</td><td style={TD}>{fmtDate(h.returnedAt)}</td><td style={TD}>{formatDuration(h.checkedOutAt)}</td></tr>)}</tbody></table>
                    </details>
                  )}
                </div>
              );
            })}
          </div>
        )}

        {tab==="QR Scanner"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <div style={{background:"#fff",borderRadius:12,padding:26,border:"1px solid #e8e5e0",textAlign:"center"}}>
                <div style={{fontSize:38,marginBottom:10}}>📷</div>
                <h3 style={{margin:"0 0 8px",fontWeight:700,fontSize:15}}>Scan a QR Code</h3>
                <p style={{color:"#888",fontSize:12,marginBottom:18}}>Point your phone camera at any tool sticker, or enter a Tool ID manually.</p>
                <button className="btn-primary" onClick={doScan} style={{width:"100%",padding:"11px 0",fontSize:13}}>Scan / Enter Tool ID</button>
                <div style={{marginTop:12,fontSize:11,color:"#aaa"}}>QR format: <code>TOOL:T001</code></div>
              </div>
              <div style={{background:"#fff",borderRadius:12,padding:20,border:"1px solid #e8e5e0"}}>
                {scanResult?(
                  scanResult.status==="unknown"
                    ?<div style={{color:"#A32D2D",fontWeight:700,padding:10}}>Tool "{scanResult.id}" not found</div>
                    :<div>
                       <div style={{fontSize:9,color:"#aaa",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.08em"}}>Scan Result</div>
                       <div style={{fontWeight:700,fontSize:17,marginBottom:3}}>{scanResult.name}</div>
                       <div style={{fontSize:11,color:"#888",marginBottom:10}}>{scanResult.id} · {scanResult.location}</div>
                       <div style={{display:"flex",gap:6,marginBottom:10}}><SBadge status={scanResult.status} hrs={getHoursOut(scanResult.checkedOutAt)}/><MBadge s={scanResult.maintainStatus}/></div>
                       {scanResult.checkedOutTo&&<div style={{fontSize:12,marginBottom:14}}><strong>Held by:</strong> {scanResult.checkedOutTo} · {formatDuration(scanResult.checkedOutAt)}</div>}
                       <div style={{display:"flex",gap:8}}>
                         {scanResult.status==="available"?<button className="btn-primary" onClick={()=>setCheckoutOpen(scanResult)}>Check Out</button>:<button className="btn-danger" onClick={()=>setReturnOpen(scanResult)}>Return</button>}
                         <button className="btn-icon" onClick={()=>setPrintTool(scanResult)}>🖨 Print</button>
                       </div>
                     </div>
                ):<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#ccc",fontSize:13,gap:8,minHeight:120}}><div style={{fontSize:32}}>🔍</div>Scan result appears here</div>}
              </div>
            </div>
            <div style={{background:"#fff",borderRadius:12,padding:18,border:"1px solid #e8e5e0"}}>
              <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.07em",textTransform:"uppercase",color:"#aaa",marginBottom:12}}>All Tool QR Codes</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:12}}>
                {tools.map(t=>(
                  <div key={t.id} style={{textAlign:"center",padding:10,border:"1px dashed #ddd",borderRadius:8}}>
                    <QRDisplay id={t.id} size={48} subLabel={t.name}/>
                    <button className="btn-icon" onClick={()=>setPrintTool(t)} style={{marginTop:6,width:"100%",fontSize:10}}>🖨 Print</button>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {tab==="Management"&&isAdmin&&(
          <div>
            <ManagementTab categories={categories} setCategories={setCategories} isAdmin={isAdmin}/>
            <div style={{marginTop:20,background:"#fff",borderRadius:12,border:"1px solid #e8e5e0",padding:"18px 20px"}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:6}}>Data Management</div>
              <div style={{fontSize:12,color:"#888",marginBottom:14}}>Data is stored on the server and shared across all users in real time.</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                <button className="btn-danger" onClick={handleResetData}>⚠ Reset to Sample Data</button>
                <button className="btn-secondary" onClick={doExport}>↓ Download Full Excel Backup</button>
              </div>
            </div>
          </div>
        )}

        {tab==="SOP"&&<SOPTab/>}

      </div>

      {addToolOpen&&isAdmin&&(
        <Modal title="Add New Tool" onClose={()=>setAddToolOpen(false)}>
          <Field label="Tool ID *"><input style={IS} placeholder="e.g. T006" value={newTool.id} onChange={e=>setNewTool(p=>({...p,id:e.target.value}))}/></Field>
          <Field label="Tool Name *"><input style={IS} placeholder="e.g. Angle Grinder 4.5in" value={newTool.name} onChange={e=>setNewTool(p=>({...p,name:e.target.value}))}/></Field>
          <div style={{display:"flex",gap:10}}>
            <Field label="Category" half><select style={IS} value={newTool.category} onChange={e=>setNewTool(p=>({...p,category:e.target.value}))}>{categories.map(c=><option key={c}>{c}</option>)}</select></Field>
            <Field label="Maintenance Status" half><select style={IS} value={newTool.maintainStatus} onChange={e=>setNewTool(p=>({...p,maintainStatus:e.target.value}))}>{MAINTAIN_STATUSES.map(s=><option key={s}>{s}</option>)}</select></Field>
          </div>
          <Field label="Location / Bay"><input style={IS} placeholder="e.g. Bay A, Shelf 3" value={newTool.location} onChange={e=>setNewTool(p=>({...p,location:e.target.value}))}/></Field>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button className="btn-secondary" style={{flex:1}} onClick={()=>setAddToolOpen(false)}>Cancel</button>
            <button className="btn-primary" style={{flex:1}} onClick={doAddTool}>Add Tool</button>
          </div>
        </Modal>
      )}

      {checkoutOpen&&(
        <Modal title={`Check Out: ${checkoutOpen.name}`} onClose={()=>setCheckoutOpen(null)}>
          <div style={{marginBottom:14,padding:"10px 12px",background:"#f8f5f0",borderRadius:8,fontSize:12}}>
            <strong>{checkoutOpen.id}</strong> · {checkoutOpen.location} · {checkoutOpen.category}
            <div style={{marginTop:5}}><MBadge s={checkoutOpen.maintainStatus}/></div>
          </div>
          <Field label="Person's Full Name *"><input style={IS} placeholder="e.g. John Smith" value={coForm.name} onChange={e=>setCoForm(p=>({...p,name:e.target.value}))}/></Field>
          <Field label="Email Address (for overdue reminders)"><input style={IS} type="email" placeholder="john@company.com" value={coForm.email} onChange={e=>setCoForm(p=>({...p,email:e.target.value}))}/></Field>
          <div style={{fontSize:11,color:"#aaa",marginBottom:14}}>Must be returned within 48 hours.</div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn-secondary" style={{flex:1}} onClick={()=>setCheckoutOpen(null)}>Cancel</button>
            <button className="btn-primary" style={{flex:1}} onClick={()=>doCheckout(checkoutOpen)}>Confirm Check Out</button>
          </div>
        </Modal>
      )}

      {returnOpen&&(
        <Modal title={`Return: ${returnOpen.name}`} onClose={()=>setReturnOpen(null)}>
          <div style={{padding:"14px",background:"#f8f5f0",borderRadius:10,marginBottom:16,fontSize:12}}>
            <div style={{marginBottom:4}}><strong>Tool:</strong> {returnOpen.name} ({returnOpen.id})</div>
            <div style={{marginBottom:4}}><strong>Held by:</strong> {returnOpen.checkedOutTo}</div>
            <div style={{marginBottom:4}}><strong>Checked out:</strong> {returnOpen.checkedOutAt?new Date(returnOpen.checkedOutAt).toLocaleString():"—"}</div>
            <div><strong>Duration:</strong> <span style={{color:getHoursOut(returnOpen.checkedOutAt)>48?"#A32D2D":"#3B6D11",fontWeight:700}}>{formatDuration(returnOpen.checkedOutAt)}</span></div>
          </div>
          <div style={{display:"flex",gap:10}}>
            <button className="btn-secondary" style={{flex:1}} onClick={()=>setReturnOpen(null)}>Cancel</button>
            <button className="btn-primary" style={{flex:1}} onClick={()=>doReturn(returnOpen)}>Confirm Return</button>
          </div>
        </Modal>
      )}

      {printTool&&<PrintLabel item={printTool} onClose={()=>setPrintTool(null)}/>}
      {emailTool&&<EmailPreview subject={overdueEmail(emailTool).subject} body={overdueEmail(emailTool).body} onClose={()=>setEmailTool(null)}/>}
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
